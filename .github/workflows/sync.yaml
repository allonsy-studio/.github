name: Sync templates
on:
    push:
        branches: [main]
        paths: ["templates/**"]
    workflow_dispatch:

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - id: weaver
              uses: allonsy-studio/actions-weaver@v4
              with:
                  token: ${{ secrets.PAT_GITHUB }}
                  templates: templates
            - run: echo '${{ steps.weaver.outputs.pull-requests }}'
